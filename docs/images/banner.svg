<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc">
  <title id="ttl">FritzTrack4U — room-level indoor positioning banner</title>
  <desc id="desc">A dark glassmorphism banner showing a four-storey house cross-section with transparent glass floors, pulsing red signal dots marking located people, and concentric blue WLAN triangulation rings, alongside the FritzTrack4U wordmark and tagline.</desc>

  <defs>
    <style>
      :root{
        --accent:#E62E33; --accent-blue:#1E9BD7; --bg:#0E1116;
        --glass:rgba(255,255,255,0.06); --text:#F2F4F7; --text-dim:#9AA4B2;
        --ok:#34C759; --warn:#FFB020;
      }
      .wordmark{ font-family:'Inter','Segoe UI',Arial,sans-serif; font-weight:800; letter-spacing:-1.5px; }
      .tag{ font-family:'Inter','Segoe UI',Arial,sans-serif; font-weight:500; letter-spacing:.5px; }
      .label{ font-family:'Inter','Segoe UI',Arial,sans-serif; font-weight:600; letter-spacing:2px; }
    </style>
    <radialGradient id="bgGlow" cx="32%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#161C26"/>
      <stop offset="55%" stop-color="#10141B"/>
      <stop offset="100%" stop-color="#0E1116"/>
    </radialGradient>
    <linearGradient id="glassFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E9BD7" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#2C3A4C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1E9BD7" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E62E33" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#E62E33" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#E62E33" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <clipPath id="frame"><rect x="0" y="0" width="1280" height="640" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1280" height="640" fill="#0E1116"/>
    <rect width="1280" height="640" fill="url(#bgGlow)"/>
    <rect width="1280" height="640" fill="url(#grid)"/>
    <rect x="0" y="0" width="1280" height="3" fill="#E62E33" opacity="0.5"/>
    <rect x="0" y="637" width="1280" height="3" fill="#1E9BD7" opacity="0.35"/>

    <g>
      <path d="M150 168 L370 78 L590 168 Z" fill="url(#glassFloor)" stroke="url(#glassEdge)" stroke-width="2"/>
      <path d="M150 168 L370 78 L590 168" fill="none" stroke="#1E9BD7" stroke-opacity="0.5" stroke-width="2"/>
      <line x1="370" y1="78" x2="370" y2="168" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>
    </g>

    <g>
      <rect x="150" y="176" width="440" height="92" rx="8" fill="url(#glassFloor)" stroke="url(#glassEdge)" stroke-width="1.6"/>
      <line x1="150" y1="222" x2="590" y2="222" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
      <text x="166" y="200" class="label" font-size="13" fill="#9AA4B2" opacity="0.75">FLOOR 4</text>
    </g>
    <g>
      <rect x="150" y="276" width="440" height="92" rx="8" fill="url(#glassFloor)" stroke="url(#glassEdge)" stroke-width="1.6"/>
      <line x1="150" y1="322" x2="590" y2="322" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
      <text x="166" y="300" class="label" font-size="13" fill="#9AA4B2" opacity="0.75">FLOOR 3</text>
    </g>
    <g>
      <rect x="150" y="376" width="440" height="92" rx="8" fill="url(#glassFloor)" stroke="url(#glassEdge)" stroke-width="1.6"/>
      <line x1="150" y1="422" x2="590" y2="422" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
      <text x="166" y="400" class="label" font-size="13" fill="#9AA4B2" opacity="0.75">FLOOR 2</text>
    </g>
    <g>
      <rect x="150" y="476" width="440" height="92" rx="8" fill="url(#glassFloor)" stroke="url(#glassEdge)" stroke-width="1.6"/>
      <line x1="150" y1="522" x2="590" y2="522" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
      <text x="166" y="500" class="label" font-size="13" fill="#9AA4B2" opacity="0.75">FLOOR 1</text>
    </g>
    <rect x="138" y="572" width="464" height="10" rx="5" fill="#000000" opacity="0.35"/>

    <g transform="translate(540,322)">
      <circle r="22" fill="none" stroke="#1E9BD7" stroke-width="2" opacity="0">
        <animate attributeName="r" values="6;70" dur="3.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="22" fill="none" stroke="#1E9BD7" stroke-width="2" opacity="0">
        <animate attributeName="r" values="6;70" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle r="6" fill="#1E9BD7"/>
      <circle r="6" fill="none" stroke="#1E9BD7" stroke-opacity="0.4" stroke-width="6"/>
    </g>
    <g transform="translate(232,522)">
      <circle r="22" fill="none" stroke="#1E9BD7" stroke-width="2" opacity="0">
        <animate attributeName="r" values="6;64" dur="3.6s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0" dur="3.6s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="22" fill="none" stroke="#1E9BD7" stroke-width="2" opacity="0">
        <animate attributeName="r" values="6;64" dur="3.6s" begin="2.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0" dur="3.6s" begin="2.3s" repeatCount="indefinite"/>
      </circle>
      <circle r="6" fill="#1E9BD7"/>
      <circle r="6" fill="none" stroke="#1E9BD7" stroke-opacity="0.4" stroke-width="6"/>
    </g>
    <g transform="translate(420,222)">
      <circle r="22" fill="none" stroke="#1E9BD7" stroke-width="2" opacity="0">
        <animate attributeName="r" values="6;58" dur="4s" begin="0.9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.45;0" dur="4s" begin="0.9s" repeatCount="indefinite"/>
      </circle>
      <circle r="6" fill="#1E9BD7"/>
      <circle r="6" fill="none" stroke="#1E9BD7" stroke-opacity="0.4" stroke-width="6"/>
    </g>

    <g stroke="#1E9BD7" stroke-opacity="0.22" stroke-width="1.4" stroke-dasharray="4 6">
      <line x1="540" y1="322" x2="320" y2="410"/>
      <line x1="232" y1="522" x2="320" y2="410"/>
      <line x1="420" y1="222" x2="320" y2="410"/>
    </g>

    <g transform="translate(320,410)">
      <circle r="30" fill="url(#dotGlow)">
        <animate attributeName="r" values="22;34;22" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="7.5" fill="#E62E33" filter="url(#softGlow)"/>
      <circle r="7.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1.5"/>
      <circle r="14" fill="none" stroke="#E62E33" stroke-width="1.6" opacity="0">
        <animate attributeName="r" values="8;26" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g transform="translate(500,222)">
      <circle r="24" fill="url(#dotGlow)">
        <animate attributeName="r" values="18;28;18" dur="2.6s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
      <circle r="6.5" fill="#E62E33" filter="url(#softGlow)"/>
      <circle r="6.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.4"/>
    </g>
    <g transform="translate(470,522)">
      <circle r="24" fill="url(#dotGlow)">
        <animate attributeName="r" values="18;28;18" dur="2.9s" begin="1.3s" repeatCount="indefinite"/>
      </circle>
      <circle r="6.5" fill="#E62E33" filter="url(#softGlow)"/>
      <circle r="6.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.4"/>
    </g>

    <g transform="translate(540,290)">
      <circle r="4" fill="#34C759"/>
      <circle r="4" fill="#34C759" opacity="0">
        <animate attributeName="r" values="4;11" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <line x1="700" y1="190" x2="700" y2="450" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>

    <g transform="translate(742,236)">
      <rect x="0" y="-18" width="11" height="11" rx="2.5" fill="#E62E33"/>
      <text x="26" y="-8" class="label" font-size="15" fill="#9AA4B2">INDOOR POSITIONING SUITE</text>
    </g>

    <g transform="translate(740,330)" filter="url(#textGlow)">
      <text x="0" y="0" class="wordmark" font-size="88" fill="#F2F4F7">FritzTrack<tspan fill="#E62E33">4U</tspan></text>
    </g>

    <rect x="744" y="354" width="120" height="5" rx="2.5" fill="#E62E33"/>
    <rect x="872" y="354" width="46" height="5" rx="2.5" fill="#1E9BD7" opacity="0.7"/>

    <text x="744" y="406" class="tag" font-size="25" fill="#9AA4B2">room-level indoor positioning</text>
    <text x="744" y="440" class="tag" font-size="25" fill="#9AA4B2">with the routers you already own</text>

    <g transform="translate(744,496)" class="tag" font-size="15">
      <circle cx="6" cy="-5" r="6" fill="#E62E33" filter="url(#softGlow)"/>
      <text x="22" y="0" fill="#F2F4F7">located person</text>
      <circle cx="196" cy="-5" r="6" fill="#1E9BD7"/>
      <text x="212" y="0" fill="#F2F4F7">WLAN signal</text>
      <circle cx="372" cy="-5" r="6" fill="#34C759"/>
      <text x="388" y="0" fill="#F2F4F7">connected</text>
    </g>
  </g>
</svg>